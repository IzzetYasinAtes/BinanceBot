<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Risk · BinanceBot</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.chart-shell {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    overflow: hidden;
}
.chart-legend {
    position: absolute;
    top: 10px; left: 12px;
    z-index: 5;
    padding: 6px 10px;
    background: rgba(11,15,20,.85);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    color: var(--fg-1);
    display: flex;
    gap: 12px;
    pointer-events: none;
}
.chart-legend .lg-kv > span:first-child { color: var(--fg-2); margin-right: 3px; }
.chart-pane { width: 100%; height: 360px; }
</style>
<script type="importmap">
{
    "imports": {
        "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js",
        "lightweight-charts": "https://esm.sh/lightweight-charts@4.2.0"
    }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, ref, onMounted, watch, onBeforeUnmount, computed } from "vue";
import { createChart, CrosshairMode, ColorType, LineStyle } from "lightweight-charts";
import { api } from "/js/api.js";
import { fmt } from "/js/format.js";
import { Sidebar, ErrorBanner, usePolling } from "/js/ui.js";

const App = {
    components: { Sidebar, ErrorBanner },
    template: `
        <div class="app">
            <Sidebar active="risk" />
            <main>
                <section class="block">
                    <h2 class="section">Risk Yönetimi</h2>
                    <p class="section-sub">Güncel risk limitleri, acil stop durumu ve anlık kayıp yüzdesi.</p>
                    <ErrorBanner :error="anyError" />

                    <div class="kpi-row" v-if="profile">
                        <div class="kpi">
                            <div class="label">İşlem Başına Risk %</div>
                            <div class="value small">{{ fmt.pct(profile.riskPerTradePct) }}</div>
                            <div class="hint">Tek trade'de riske atılabilecek maks bakiye yüzdesi</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Max Pozisyon Boyutu %</div>
                            <div class="value small">{{ fmt.pct(profile.maxPositionSizePct) }}</div>
                            <div class="hint">Bakiyenin yüzdesi olarak izin verilen max açık pozisyon</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Max Kayıp 24s</div>
                            <div class="value small">{{ fmt.pct(profile.maxDrawdown24hPct) }}</div>
                            <div class="hint">Son 24 saatteki izin verilen max kayıp eşiği</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Max Kayıp Tüm Zaman</div>
                            <div class="value small">{{ fmt.pct(profile.maxDrawdownAllTimePct) }}</div>
                            <div class="hint">Tüm zamanlarda izin verilen max düşüş eşiği</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Max Ardışık Kayıp</div>
                            <div class="value small">{{ profile.maxConsecutiveLosses }}</div>
                            <div class="hint">Bu sayıyı aşan ardışık kayıp acil stop tetikler</div>
                        </div>
                    </div>

                    <div class="kpi-row" v-if="profile" style="margin-top:14px;">
                        <div class="kpi">
                            <div class="label">Acil Stop Durumu</div>
                            <div class="value small">
                                <span class="badge" :class="cbClass">{{ cbLabel }}</span>
                            </div>
                            <div class="hint" v-if="cb?.reason">{{ cb.reason }}</div>
                            <div class="hint" v-else>Sistem normal çalışıyor</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Anlık Kayıp Yüzdesi</div>
                            <div class="value" :class="ddClass">{{ fmt.pct(profile.currentDrawdownPct) }}</div>
                            <div class="hint">Peak'ten ne kadar düştük</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Ardışık Kayıp Sayısı</div>
                            <div class="value">{{ profile.consecutiveLosses }}</div>
                            <div class="hint">Üst üste kaybedilen trade adedi</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Bugünkü Gerçekleşen K/Z</div>
                            <div class="value small" :class="fmt.sign(profile.realizedPnl24h)">
                                {{ fmt.moneySigned(profile.realizedPnl24h) }}
                            </div>
                            <div class="hint">Son 24 saat kapanan pozisyonların toplam karı/zararı</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Toplam Gerçekleşen K/Z</div>
                            <div class="value small" :class="fmt.sign(profile.realizedPnlAllTime)">
                                {{ fmt.moneySigned(profile.realizedPnlAllTime) }}
                            </div>
                            <div class="hint">Tüm zamanların kümülatif kar/zararı</div>
                        </div>
                    </div>
                </section>

                <section class="block">
                    <h2 class="section">Kayıp Geçmişi (Son 30 Gün)</h2>
                    <p class="section-sub">
                        Yeşil çizgi: kümülatif equity (sermaye değişimi). Kırmızı çizgi: drawdown yüzdesi —
                        peak'ten ne kadar düştüğümüzü gösterir, 0 = peak'teyiz.
                    </p>
                    <div class="chart-shell">
                        <div class="chart-legend">
                            <span class="lg-kv"><span>Equity</span><strong style="color:var(--accent);">{{ hoverEquity }}</strong></span>
                            <span class="lg-kv"><span>DD</span><strong style="color:var(--bad);">{{ hoverDd }}</strong></span>
                        </div>
                        <div class="chart-pane" ref="chartEl"></div>
                        <div v-if="!ddPoll.data.value || ddPoll.data.value.length === 0"
                             style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--fg-3);font-size:12px;pointer-events:none;">
                            Henüz kapanan pozisyon yok
                        </div>
                    </div>
                </section>
            </main>
        </div>
    `,
    setup() {
        const profilePoll = usePolling(() => api.risk.profile(), 3000);
        const cbPoll = usePolling(() => api.risk.circuitBreaker(), 3000);
        const ddPoll = usePolling(() => api.risk.drawdownHistory(30), 10000);

        const chartEl = ref(null);
        const hoverEquity = ref("—");
        const hoverDd = ref("—");

        let chart = null;
        let equitySeries = null;
        let ddSeries = null;
        let ro = null;

        function dispose() {
            if (ro) { ro.disconnect(); ro = null; }
            if (chart) { chart.remove(); chart = null; }
            equitySeries = null; ddSeries = null;
        }

        function initChart() {
            dispose();
            if (!chartEl.value) return;

            chart = createChart(chartEl.value, {
                width: chartEl.value.clientWidth,
                height: chartEl.value.clientHeight,
                layout: {
                    background: { type: ColorType.Solid, color: "#0b0f14" },
                    textColor: "#9aa8b9",
                    fontFamily: "JetBrains Mono, ui-monospace, monospace",
                    fontSize: 11,
                },
                grid: {
                    vertLines: { color: "#141a23" },
                    horzLines: { color: "#141a23" },
                },
                crosshair: {
                    mode: CrosshairMode.Normal,
                    vertLine: { color: "#22d3a6", width: 1, style: LineStyle.Dashed, labelBackgroundColor: "#22d3a6" },
                    horzLine: { color: "#22d3a6", width: 1, style: LineStyle.Dashed, labelBackgroundColor: "#22d3a6" },
                },
                rightPriceScale: { borderColor: "#1e2530" },
                leftPriceScale:  { borderColor: "#1e2530", visible: true },
                timeScale: { borderColor: "#1e2530", timeVisible: true, secondsVisible: false },
            });

            equitySeries = chart.addAreaSeries({
                priceScaleId: "right",
                lineColor: "#22d3a6",
                topColor: "rgba(34,211,166,.25)",
                bottomColor: "rgba(34,211,166,.00)",
                lineWidth: 2,
                title: "Equity",
            });
            ddSeries = chart.addLineSeries({
                priceScaleId: "left",
                color: "#ef5350",
                lineWidth: 2,
                title: "DD %",
                priceFormat: { type: "percent", precision: 2, minMove: 0.01 },
            });

            chart.subscribeCrosshairMove((param) => {
                if (!param.time || !param.seriesData) {
                    hoverEquity.value = "—";
                    hoverDd.value = "—";
                    return;
                }
                const e = param.seriesData.get(equitySeries);
                const d = param.seriesData.get(ddSeries);
                hoverEquity.value = e ? fmt.num2(e.value) : "—";
                hoverDd.value     = d ? fmt.num2(d.value) + "%" : "—";
            });

            ro = new ResizeObserver(() => {
                if (chart && chartEl.value) {
                    chart.applyOptions({ width: chartEl.value.clientWidth });
                }
            });
            ro.observe(chartEl.value);
        }

        function render(points) {
            if (!equitySeries || !ddSeries) return;
            if (!points || points.length === 0) {
                equitySeries.setData([]);
                ddSeries.setData([]);
                return;
            }
            const rows = points.map(p => ({
                time: Math.floor(new Date(p.atUtc).getTime() / 1000),
                equity: Number(p.equity),
                dd: Number(p.drawdownPct) * 100,
            }));
            equitySeries.setData(rows.map(r => ({ time: r.time, value: r.equity })));
            ddSeries.setData(rows.map(r => ({ time: r.time, value: r.dd })));
            chart.timeScale().fitContent();
        }

        onMounted(() => {
            initChart();
            if (ddPoll.data.value) render(ddPoll.data.value);
        });

        watch(ddPoll.data, (v) => {
            if (!equitySeries) initChart();
            render(v);
        });

        onBeforeUnmount(dispose);

        const anyError = computed(() =>
            profilePoll.error.value ?? cbPoll.error.value ?? ddPoll.error.value);

        const ddClass = computed(() => {
            const d = profilePoll.data.value?.currentDrawdownPct ?? 0;
            return d > 0.05 ? "metric-bad" : d > 0.02 ? "metric-warn" : "metric-good";
        });
        const cbClass = computed(() => {
            const s = cbPoll.data.value?.status;
            return s === "Healthy" ? "good" : s === "Tripped" ? "bad" : "warn";
        });
        const cbLabel = computed(() => {
            const s = cbPoll.data.value?.status;
            if (s === "Healthy") return "NORMAL";
            if (s === "Tripped") return "ACIL STOP";
            if (s === "Warning") return "UYARI";
            return s ?? "—";
        });

        return {
            profile: profilePoll.data, cb: cbPoll.data, ddPoll,
            chartEl, hoverEquity, hoverDd,
            anyError, ddClass, cbClass, cbLabel, fmt,
        };
    },
};

createApp(App).mount("#app");
</script>
</body>
</html>
