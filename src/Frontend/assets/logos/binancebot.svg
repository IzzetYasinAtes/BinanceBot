<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bbGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background with gradient -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" fill="url(#bbGrad)"/>
  <!-- top glass reflection -->
  <rect x="1.5" y="1.5" width="29" height="14" rx="7.5" fill="url(#bbGlow)"/>

  <!-- Candlestick group (background accent) -->
  <g opacity="0.35" stroke="#ffffff" stroke-linecap="round">
    <line x1="7" y1="19" x2="7" y2="25" stroke-width="1"/>
    <rect x="5.6" y="20" width="2.8" height="3.5" rx="0.5" fill="#ffffff" stroke="none"/>
    <line x1="12" y1="14" x2="12" y2="23" stroke-width="1"/>
    <rect x="10.6" y="15.5" width="2.8" height="5" rx="0.5" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Uptrend line + nodes (primary mark) -->
  <path d="M6 22 L11 17 L16 19 L21 12 L26 8"
        stroke="#ffffff" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="11" cy="17" r="1.7" fill="#ffffff"/>
  <circle cx="16" cy="19" r="1.7" fill="#ffffff"/>
  <circle cx="21" cy="12" r="1.7" fill="#ffffff"/>
  <circle cx="26" cy="8"  r="2.2" fill="#ffffff"/>
  <circle cx="26" cy="8"  r="3.6" fill="#ffffff" fill-opacity="0.2"/>

  <!-- Circuit detail (bottom-left corner) -->
  <g stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M4 27 L7 27 L7 25"/>
    <circle cx="4" cy="27" r="0.8" fill="#ffffff" stroke="none"/>
  </g>
</svg>
