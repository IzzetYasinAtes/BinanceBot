<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Genel Bakış · BinanceBot</title>
<link rel="stylesheet" href="/css/style.css">
<script type="importmap">
{
    "imports": {
        "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js"
    }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, computed } from "vue";
import { api, getAdminKey, clearAdminKey, ApiError } from "/js/api.js";
import { fmt } from "/js/format.js";
import { Sidebar, ErrorBanner, usePolling } from "/js/ui.js";

const SYMBOLS = ["BTCUSDT", "BNBUSDT", "XRPUSDT"];
const EMPTY_MODE = { startingBalance: 0, currentBalance: 0, equity: 0, resetCount: 0, startedAt: null, blockedReason: null };

const App = {
    components: { Sidebar, ErrorBanner },
    template: `
        <div class="app">
            <Sidebar active="dashboard" />
            <main>
                <ErrorBanner :error="anyError" />

                <section class="block">
                    <h2 class="section">Portföy Özeti</h2>
                    <p class="section-sub">
                        Çalışan motorların anlık özet bilgileri. Mevcut bakiye, kar/zarar, kazanma oranı ve açık pozisyon sayısı burada görünür.
                    </p>
                    <div class="kpi-row">
                        <div class="kpi">
                            <div class="label">Başlangıç Bakiyesi</div>
                            <div class="value">\${{ fmt.num2(balances.Paper.startingBalance) }}</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Mevcut Bakiye</div>
                            <div class="value" :class="equityClass">\${{ fmt.num2(equity) }}</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Realized Today</div>
                            <div class="value" :class="fmt.sign(pnl?.realizedToday)">
                                \${{ fmt.num2(pnl?.realizedToday ?? 0) }}
                            </div>
                        </div>
                        <div class="kpi">
                            <div class="label">Unrealized</div>
                            <div class="value" :class="fmt.sign(pnl?.unrealizedTotal)">
                                \${{ fmt.num2(pnl?.unrealizedTotal ?? 0) }}
                            </div>
                        </div>
                        <div class="kpi">
                            <div class="label">Kazanma Oranı</div>
                            <div class="value small">{{ winRateLabel }}</div>
                            <div class="hint">{{ winRateHint }}</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Toplam İşlem</div>
                            <div class="value">{{ totalOrders }}</div>
                            <div class="hint">{{ openCount }} açık</div>
                        </div>
                    </div>
                </section>

                <section class="block">
                    <h2 class="section">3 Mod Bakiyeleri</h2>
                    <p class="section-sub">
                        Her sinyal 3 modda ayrı işlem olarak yürütülür. Paper canlı simülasyon, LiveTestnet gerçek testnet API'si, LiveMainnet kalıcı olarak bloklu (ADR-0006).
                    </p>
                    <div class="kpi-row">
                        <div class="kpi" style="grid-column: span 2;">
                            <div class="label">PAPER · iter #{{ balances.Paper.resetCount ?? 0 }}</div>
                            <div class="value" :class="fmt.sign(balances.Paper.equity - balances.Paper.startingBalance)">
                                \${{ fmt.num2(balances.Paper.equity) }}
                            </div>
                            <div class="hint">
                                başlangıç \${{ fmt.num2(balances.Paper.startingBalance) }} · nakit \${{ fmt.num2(balances.Paper.currentBalance) }}
                                <span v-if="paperAgeLabel"> · {{ paperAgeLabel }}</span>
                            </div>
                            <button @click="resetPaper" style="margin-top:8px;">Reset Iteration</button>
                        </div>

                        <div class="kpi">
                            <div class="label">LIVE TESTNET</div>
                            <div class="value small"><span class="badge warn">OFFLINE</span></div>
                            <div class="hint">{{ balances.LiveTestnet.blockedReason ?? '—' }}</div>
                            <div class="hint" style="color:var(--fg-3);">API key girildiğinde aktive olur</div>
                        </div>

                        <div class="kpi">
                            <div class="label">LIVE MAINNET</div>
                            <div class="value small"><span class="badge bad">BLOCKED</span></div>
                            <div class="hint">ADR-0006 · canlı para koruması</div>
                        </div>
                    </div>
                </section>

                <section class="block">
                    <h2 class="section">Aktif Sinyaller</h2>
                    <p class="section-sub">
                        Sistem tarafından üretilen son alım-satım sinyalleri. Her kart bir kripto para için
                        üretilen yön tahminini gösterir. UP = fiyat artacak, DOWN = fiyat düşecek.
                    </p>
                    <div class="signals-grid" v-if="signals && signals.length > 0">
                        <div v-for="s in signals" :key="s.id" class="signal-card">
                            <div class="head">
                                <div>
                                    <span class="sym">{{ baseAsset(s.symbol) }}</span>
                                    <span class="iv">{{ s.strategyType }}</span>
                                </div>
                                <span class="badge" :class="signalBadge(s.direction)">{{ signalLabel(s.direction) }}</span>
                            </div>
                            <div class="rows">
                                <span class="k">Fiyat</span>
                                <span class="v accent">{{ s.suggestedPrice ? fmt.price(s.suggestedPrice) : '—' }}</span>
                                <span class="k">Qty</span>
                                <span class="v">{{ fmt.num4(s.suggestedQuantity) }}</span>
                                <span class="k">Bar</span>
                                <span class="v">{{ fmt.timeHms(s.barOpenTime) }}</span>
                                <span class="k">Strat</span>
                                <span class="v">{{ s.strategyName }}</span>
                            </div>
                            <div class="time">{{ fmt.timeIso(s.emittedAt) }}</div>
                        </div>
                    </div>
                    <div v-else-if="signals" class="kpi" style="color:var(--fg-2);text-align:center;padding:20px;">
                        Henüz sinyal yok · Aktif strateji gerekiyor
                    </div>
                    <div v-else class="signals-grid">
                        <div v-for="n in 4" :key="n" class="skeleton" style="height:120px"></div>
                    </div>
                </section>

                <section class="block">
                    <h2 class="section">Canlı Piyasa</h2>
                    <p class="section-sub">Takip edilen sembollerin son fiyat ve 24s hacmi.</p>
                    <table class="data" v-if="summary">
                        <thead><tr>
                            <th>Sembol</th>
                            <th class="align-right">Son Fiyat</th>
                            <th class="align-right">Mid</th>
                            <th class="align-right">24s Değişim</th>
                            <th class="align-right">24s Hacim</th>
                            <th class="align-right">Güncelleme</th>
                        </tr></thead>
                        <tbody>
                            <tr v-for="row in summary" :key="row.symbol">
                                <td><strong>{{ row.symbol }}</strong></td>
                                <td class="align-right">{{ fmt.price(row.lastPrice) }}</td>
                                <td class="align-right">{{ fmt.price(row.markPrice) }}</td>
                                <td class="align-right" :class="fmt.sign(row.change24hPct)">
                                    {{ fmt.pctRaw(row.change24hPct) }}
                                </td>
                                <td class="align-right">{{ fmt.num2(row.volume24hQuote) }}</td>
                                <td class="align-right" style="color:var(--fg-3);">{{ fmt.timeHms(row.asOfUtc) }}</td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-else class="skeleton" style="height:140px"></div>
                </section>

                <section class="block">
                    <h2 class="section">Son İşlemler</h2>
                    <p class="section-sub">En son gerçekleştirilen alım-satım işlemleri. Giriş fiyatı, kar/zarar ve işlem durumu burada takip edilir.</p>
                    <table class="data" v-if="orders">
                        <thead><tr>
                            <th>Sembol</th><th>Mode</th><th>Yön</th><th>Tip</th>
                            <th class="align-right">Adet</th>
                            <th class="align-right">Fiyat</th>
                            <th class="align-right">Gerçekleşen</th>
                            <th>Durum</th>
                            <th>Zaman</th>
                        </tr></thead>
                        <tbody>
                            <tr v-for="o in orders.items" :key="o.clientOrderId">
                                <td><strong>{{ o.symbol }}</strong></td>
                                <td><span class="badge" :class="modeBadge(o.mode)">{{ modeLabel(o.mode) }}</span></td>
                                <td><span class="badge" :class="o.side === 'Buy' ? 'up' : 'down'">{{ o.side === 'Buy' ? 'UP' : 'DOWN' }}</span></td>
                                <td>{{ o.type }}</td>
                                <td class="align-right">{{ fmt.num4(o.quantity) }}</td>
                                <td class="align-right">{{ o.price ? fmt.price(o.price) : '—' }}</td>
                                <td class="align-right">{{ fmt.num4(o.executedQuantity) }}</td>
                                <td><span class="badge" :class="statusBadge(o.status)">{{ statusLabel(o.status) }}</span></td>
                                <td style="color:var(--fg-3);">{{ fmt.timeHms(o.createdAt) }}</td>
                            </tr>
                            <tr v-if="orders.items.length === 0">
                                <td colspan="9" style="text-align:center;color:var(--fg-3);padding:18px;">Henüz işlem yok</td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-else class="skeleton" style="height:140px"></div>
                </section>
            </main>
        </div>
    `,
    setup() {
        const summaryPoll  = usePolling(() => api.marketSummary(SYMBOLS), 3000);
        const pnlPoll      = usePolling(() => api.positions.pnlToday(), 3000);
        const signalsPoll  = usePolling(() => api.strategies.latestSignals(8), 5000);
        const ordersPoll   = usePolling(() => api.orders.history({ skip: 0, take: 15 }), 5000);
        const balancesPoll = usePolling(() => api.balances.list(), 3000);

        const anyError = computed(() =>
            summaryPoll.error.value ?? pnlPoll.error.value
            ?? signalsPoll.error.value ?? ordersPoll.error.value
            ?? balancesPoll.error.value);

        const balances = computed(() => {
            const rows = balancesPoll.data.value ?? [];
            return {
                Paper:        rows.find(r => r.mode === "Paper")        ?? { ...EMPTY_MODE },
                LiveTestnet:  rows.find(r => r.mode === "LiveTestnet")  ?? { ...EMPTY_MODE },
                LiveMainnet:  rows.find(r => r.mode === "LiveMainnet")  ?? { ...EMPTY_MODE },
            };
        });

        const equity = computed(() => Number(balances.value.Paper.equity ?? 0));
        const equityClass = computed(() => {
            const diff = equity.value - Number(balances.value.Paper.startingBalance ?? 0);
            return diff > 0 ? "metric-good" : diff < 0 ? "metric-bad" : "metric-neutral";
        });

        function ageSince(iso) {
            if (!iso) return "";
            const mins = (Date.now() - new Date(iso).getTime()) / 60000;
            if (!isFinite(mins) || mins < 0) return "";
            if (mins < 60) return `${Math.floor(mins)}dk önce başladı`;
            return `${(mins / 60).toFixed(1)}s önce başladı`;
        }
        const paperAgeLabel = computed(() => ageSince(balances.value.Paper.startedAt));

        async function resetPaper() {
            const adminKey = getAdminKey({ promptMessage: "Admin key (ilk kez):" });
            if (!adminKey) return;
            const starting = window.prompt("Başlangıç bakiyesi (USDT):", "100");
            if (!starting) return;
            const startingNum = Number(starting);
            if (!isFinite(startingNum) || startingNum <= 0) {
                window.alert("Geçersiz başlangıç bakiyesi.");
                return;
            }
            try {
                await api.balances.resetPaper(startingNum, adminKey);
                balancesPoll.refresh();
                ordersPoll.refresh();
                pnlPoll.refresh();
            } catch (e) {
                if (e instanceof ApiError && e.status === 401) {
                    clearAdminKey();
                    window.alert("Admin key reddedildi, tekrar dene.");
                } else {
                    window.alert("Reset hata: " + (e?.message ?? String(e)));
                }
            }
        }

        function modeBadge(m) {
            if (m === "Paper") return "open";
            if (m === "LiveTestnet") return "warn";
            if (m === "LiveMainnet") return "bad";
            return "";
        }
        function modeLabel(m) {
            if (m === "LiveTestnet") return "TEST";
            if (m === "LiveMainnet") return "MAIN";
            return "PAPER";
        }

        const totalOrders = computed(() => ordersPoll.data.value?.totalCount ?? 0);
        const openCount   = computed(() => pnlPoll.data.value?.openPositionCount ?? 0);

        const winRateLabel = computed(() => {
            const items = ordersPoll.data.value?.items ?? [];
            if (items.length === 0) return "—";
            const filled = items.filter(o => o.status === "Filled").length;
            const rejected = items.filter(o => ["Rejected","Expired","Cancelled"].includes(o.status)).length;
            const total = filled + rejected;
            if (total === 0) return "—";
            return `${((filled / total) * 100).toFixed(1)}%`;
        });
        const winRateHint = computed(() => {
            const items = ordersPoll.data.value?.items ?? [];
            const filled = items.filter(o => o.status === "Filled").length;
            return `${filled} doldu / ${items.length} toplam`;
        });

        function baseAsset(sym) {
            return sym.replace(/USDT$/i, "");
        }
        function signalLabel(dir) {
            return dir === "Long" ? "UP" : dir === "Short" ? "DOWN" : "EXIT";
        }
        function signalBadge(dir) {
            return dir === "Long" ? "up" : dir === "Short" ? "down" : "warn";
        }
        function statusBadge(s) {
            if (s === "Filled") return "good";
            if (s === "Rejected" || s === "Cancelled" || s === "Expired") return "bad";
            if (s === "PartiallyFilled") return "warn";
            return "open";
        }
        function statusLabel(s) {
            return s === "Filled" ? "FILLED"
                : s === "Cancelled" ? "CANCEL"
                : s === "Rejected" ? "REJECT"
                : s === "PartiallyFilled" ? "PART"
                : s === "Expired" ? "EXPIR"
                : "OPEN";
        }

        return {
            summary: summaryPoll.data,
            pnl: pnlPoll.data,
            signals: signalsPoll.data,
            orders: ordersPoll.data,
            anyError,
            balances, paperAgeLabel,
            equity, equityClass, totalOrders, openCount,
            winRateLabel, winRateHint,
            baseAsset, signalLabel, signalBadge, statusBadge, statusLabel,
            modeBadge, modeLabel,
            resetPaper,
            fmt,
        };
    },
};

createApp(App).mount("#app");
</script>
</body>
</html>
