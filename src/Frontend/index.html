<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Genel Bakış · BinanceBot</title>
<link rel="stylesheet" href="/css/style.css">
<script type="importmap">
{
    "imports": {
        "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js"
    }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, computed, ref } from "vue";
import { api, ApiError } from "/js/api.js";
import { fmt } from "/js/format.js";
import { Sidebar, ErrorBanner, usePolling } from "/js/ui.js";

const SYMBOLS = ["BTCUSDT", "BNBUSDT", "XRPUSDT"];

// Sticky 1m %change ticker bar (BTC/BNB/XRP). Polling 10sn — 3 sembol = 3 hafif fetch.
const MarketTickerBar = {
    props: { symbols: { type: Array, required: true } },
    template: `
        <div class="ticker-bar" style="position:sticky;top:0;z-index:50;display:flex;gap:18px;align-items:center;
                                       padding:10px 16px;background:var(--bg-1,#0b0f14);
                                       border-bottom:1px solid var(--border,#1c2530);
                                       font-family:inherit;min-height:44px;">
            <span style="color:var(--fg-3);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;">1dk</span>
            <div v-for="t in tickers" :key="t.symbol"
                 style="display:flex;gap:10px;align-items:baseline;font-size:14px;">
                <strong style="color:var(--fg-1);">{{ t.base }}</strong>
                <span class="tabular-nums mono" style="color:var(--fg-2);">
                    {{ t.price !== null ? fmt.price(t.price) : '—' }}
                </span>
                <span class="tabular-nums" :class="t.cls"
                      style="font-weight:700;min-width:72px;text-align:right;">
                    {{ t.pctLabel }}
                </span>
            </div>
        </div>
    `,
    setup(props) {
        const polls = props.symbols.map(sym => ({
            symbol: sym,
            poll: usePolling(() => api.klines(sym, "1m", 2), 10000),
        }));

        const tickers = computed(() => polls.map(({ symbol, poll }) => {
            const bars = poll.data.value;
            const base = symbol.replace(/USDT$/i, "");
            if (!Array.isArray(bars) || bars.length < 2) {
                return { symbol, base, price: null, pctLabel: "—", cls: "metric-neutral" };
            }
            const prev = Number(bars[0].close);
            const last = Number(bars[1].close);
            if (!isFinite(prev) || prev === 0 || !isFinite(last)) {
                return { symbol, base, price: last, pctLabel: "—", cls: "metric-neutral" };
            }
            const pct = ((last - prev) / prev) * 100;
            const cls = pct > 0 ? "metric-good" : pct < 0 ? "metric-bad" : "metric-neutral";
            return { symbol, base, price: last, pctLabel: fmt.pctSigned(pct), cls };
        }));

        return { tickers, fmt };
    },
};

const App = {
    components: { Sidebar, ErrorBanner, MarketTickerBar },
    template: `
        <div class="app">
            <Sidebar active="dashboard" />
            <main>
                <MarketTickerBar :symbols="symbolList" />
                <ErrorBanner :error="anyError" />

                <!-- HERO: Net K/Z — büyük rakam, renkli -->
                <section class="block">
                    <div class="hero-card">
                        <div class="hero-label">Toplam Net Kar / Zarar</div>
                        <div class="hero-value" :class="netClass" v-if="summary">
                            {{ fmt.moneySigned(summary.netPnl) }}
                            <span class="pct">({{ fmt.pctSigned(summary.netPnlPct) }})</span>
                        </div>
                        <div class="hero-value metric-neutral" v-else>—</div>
                        <div class="hero-sub" v-if="summary">
                            Başlangıç: <strong>{{ fmt.money(summary.startingBalance) }}</strong>
                            &nbsp;→&nbsp; Şu anki Gerçek Değer:
                            <strong>{{ fmt.money(summary.trueEquity) }}</strong>
                            <span style="color:var(--fg-3);margin-left:10px;">
                                ({{ fmt.timeHms(summary.asOfUtc) }})
                            </span>
                        </div>
                        <div class="hero-sub" v-else style="color:var(--fg-3);">
                            Portföy özeti yükleniyor…
                        </div>
                    </div>
                </section>

                <!-- 4 KPI: Bugünkü Realized · Açık PnL · Komisyon · Net Kar (komisyon sonrası) -->
                <section class="block">
                    <h2 class="section">Anlık Performans</h2>
                    <p class="section-sub">Bugün gerçekleşen ve şu an açık olan pozisyonların özet metrikleri.</p>
                    <div class="kpi-row" v-if="summary">
                        <div class="kpi">
                            <div class="label">Bugünkü Gerçekleşen K/Z</div>
                            <div class="value" :class="fmt.sign(summary.realizedPnl24h)">
                                {{ fmt.moneySigned(summary.realizedPnl24h) }}
                            </div>
                            <div class="hint">Son 24 saat içinde kapanan pozisyonların toplam karı/zararı</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Açık Pozisyon K/Z</div>
                            <div class="value" :class="fmt.sign(summary.unrealizedPnlTotal)">
                                {{ fmt.moneySigned(summary.unrealizedPnlTotal) }}
                            </div>
                            <div class="hint">{{ summary.openPositionCount }} açık pozisyon — anlık piyasa fiyatına göre</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Toplam Komisyon Ödenen</div>
                            <div class="value metric-warn">
                                {{ fmt.money(summary.totalCommissionPaid) }}
                            </div>
                            <div class="hint">Tüm işlemlerin toplam emir ücreti</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Net Kar (Komisyon Sonrası)</div>
                            <div class="value" :class="fmt.sign(summary.netProfitAfterFees)">
                                {{ fmt.moneySigned(summary.netProfitAfterFees) }}
                            </div>
                            <div class="hint">Realized + Unrealized − Komisyon</div>
                        </div>
                    </div>
                    <div v-else class="kpi-row">
                        <div v-for="n in 4" :key="n" class="skeleton" style="height:120px"></div>
                    </div>
                </section>

                <!-- Trade istatistikleri: Toplam İşlem + Kazanma Oranı -->
                <section class="block">
                    <h2 class="section">İşlem İstatistikleri</h2>
                    <p class="section-sub">Tamamlanan trade'lerin başarı oranı (sipariş doluluk oranı değil — gerçek kar/zarar bazlı).</p>
                    <div class="kpi-row" v-if="summary">
                        <div class="kpi">
                            <div class="label">Toplam İşlem</div>
                            <div class="value">{{ summary.closedTradeCount }}</div>
                            <div class="hint">{{ summary.openPositionCount }} açık · {{ summary.closedTradeCount }} kapalı</div>
                        </div>
                        <div class="kpi">
                            <div class="label">Kazanma Oranı</div>
                            <div class="value" :class="winRateClass">
                                %{{ fmt.num2(summary.winRate) }}
                            </div>
                            <div class="hint">
                                <span class="metric-good">{{ summary.winningTrades }} kazanan</span>
                                · <span class="metric-bad">{{ summary.losingTrades }} kayıp</span>
                            </div>
                        </div>
                    </div>
                    <div v-else class="kpi-row">
                        <div v-for="n in 2" :key="n" class="skeleton" style="height:100px"></div>
                    </div>
                </section>

                <!-- Aktif sinyaller (TR'leştirildi) -->
                <section class="block">
                    <h2 class="section">Aktif Sinyaller</h2>
                    <p class="section-sub">
                        Sistem tarafından üretilen son alım-satım sinyalleri. Yön: ALIŞ (Long) = fiyat artacak, SATIŞ (Short) = fiyat düşecek.
                    </p>
                    <div class="signals-grid" v-if="signals && signals.length > 0">
                        <div v-for="s in signals" :key="s.id" class="signal-card">
                            <div class="head">
                                <div>
                                    <span class="sym">{{ baseAsset(s.symbol) }}</span>
                                    <span class="iv">{{ s.strategyType }}</span>
                                </div>
                                <span class="badge" :class="signalBadge(s.direction)">{{ signalLabel(s.direction) }}</span>
                            </div>
                            <div class="rows">
                                <span class="k">Fiyat</span>
                                <span class="v accent">{{ s.suggestedPrice ? fmt.price(s.suggestedPrice) : '—' }}</span>
                                <span class="k">Adet</span>
                                <span class="v">{{ fmt.num4(s.suggestedQuantity) }}</span>
                                <span class="k">Bar</span>
                                <span class="v">{{ fmt.timeHms(s.barOpenTime) }}</span>
                                <span class="k">Strateji</span>
                                <span class="v">{{ s.strategyName }}</span>
                            </div>
                            <div class="time">{{ fmt.timeIso(s.emittedAt) }}</div>
                        </div>
                    </div>
                    <div v-else-if="signals" class="kpi" style="color:var(--fg-2);text-align:center;padding:24px;">
                        Henüz sinyal yok · Aktif strateji gerekiyor
                    </div>
                    <div v-else class="signals-grid">
                        <div v-for="n in 4" :key="n" class="skeleton" style="height:140px"></div>
                    </div>
                </section>

                <!-- Canlı piyasa -->
                <section class="block">
                    <h2 class="section">Canlı Piyasa</h2>
                    <p class="section-sub">Takip edilen sembollerin son fiyat ve 24 saatlik hacim özeti.</p>
                    <table class="data" v-if="summary2">
                        <thead><tr>
                            <th>Sembol</th>
                            <th class="align-right">Son Fiyat</th>
                            <th class="align-right">Mid</th>
                            <th class="align-right">24s Değişim</th>
                            <th class="align-right">24s Hacim</th>
                            <th class="align-right">Güncelleme</th>
                        </tr></thead>
                        <tbody>
                            <tr v-for="row in summary2" :key="row.symbol">
                                <td><strong>{{ row.symbol }}</strong></td>
                                <td class="align-right num">{{ fmt.price(row.lastPrice) }}</td>
                                <td class="align-right num">{{ fmt.price(row.markPrice) }}</td>
                                <td class="align-right num" :class="fmt.sign(row.change24hPct)">
                                    {{ fmt.pctSigned(row.change24hPct) }}
                                </td>
                                <td class="align-right num">{{ fmt.num2(row.volume24hQuote) }}</td>
                                <td class="align-right num" style="color:var(--fg-3);">{{ fmt.timeHms(row.asOfUtc) }}</td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-else class="skeleton" style="height:140px"></div>
                </section>

                <!-- Son işlemler -->
                <section class="block">
                    <h2 class="section">Son İşlemler</h2>
                    <p class="section-sub">En son gerçekleştirilen alım-satım emirleri. Detaylı işlem geçmişi için "İşlemler" sekmesine geçin.</p>
                    <table class="data" v-if="orders">
                        <thead><tr>
                            <th>Sembol</th><th>Mod</th><th>Yön</th><th>Tip</th>
                            <th class="align-right">Adet</th>
                            <th class="align-right">Fiyat</th>
                            <th class="align-right">Gerçekleşen</th>
                            <th>Durum</th>
                            <th>Zaman</th>
                        </tr></thead>
                        <tbody>
                            <tr v-for="o in orders.items" :key="o.clientOrderId">
                                <td><strong>{{ o.symbol }}</strong></td>
                                <td><span class="badge" :class="modeBadge(o.mode)">{{ modeLabel(o.mode) }}</span></td>
                                <td><span class="badge" :class="o.side === 'Buy' ? 'up' : 'down'">{{ o.side === 'Buy' ? 'ALIŞ' : 'SATIŞ' }}</span></td>
                                <td>{{ o.type }}</td>
                                <td class="align-right num">{{ fmt.num4(o.quantity) }}</td>
                                <td class="align-right num">{{ o.price ? fmt.price(o.price) : '—' }}</td>
                                <td class="align-right num">{{ fmt.num4(o.executedQuantity) }}</td>
                                <td><span class="badge" :class="statusBadge(o.status)">{{ statusLabel(o.status) }}</span></td>
                                <td style="color:var(--fg-3);">{{ fmt.timeHms(o.createdAt) }}</td>
                            </tr>
                            <tr v-if="orders.items.length === 0">
                                <td colspan="9" style="text-align:center;color:var(--fg-3);padding:18px;">Henüz işlem yok</td>
                            </tr>
                        </tbody>
                    </table>
                    <div v-else class="skeleton" style="height:140px"></div>
                </section>
            </main>
        </div>
    `,
    setup() {
        const summaryPoll  = usePolling(() => api.marketSummary(SYMBOLS), 3000);
        const ordersPoll   = usePolling(() => api.orders.history({ skip: 0, take: 15 }), 5000);

        // Yeni endpoint — backend hazır olmayabilir, fallback compose ediyoruz.
        const portfolioSummary = ref(null);
        const portfolioError = ref(null);

        async function fetchPortfolio() {
            try {
                const data = await api.portfolio.summary();
                portfolioSummary.value = data;
                portfolioError.value = null;
            } catch (e) {
                if (e instanceof ApiError && e.status === 404) {
                    // Backend hazır değil — fallback compose
                    try {
                        const [balances, pnl, ordersHist] = await Promise.all([
                            api.balances.list(),
                            api.positions.pnlToday(),
                            api.orders.history({ skip: 0, take: 200 }),
                        ]);
                        const paper = (balances ?? []).find(r => r.mode === "Paper") ?? {};
                        const startingBalance = Number(paper.startingBalance ?? 0);
                        const currentCash = Number(paper.currentBalance ?? 0);
                        const trueEquity = Number(paper.equity ?? currentCash);
                        const realized = Number(pnl?.realizedToday ?? 0);
                        const unrealized = Number(pnl?.unrealizedTotal ?? 0);
                        const netPnl = trueEquity - startingBalance;
                        const netPnlPct = startingBalance > 0 ? (netPnl / startingBalance) * 100 : 0;
                        const items = ordersHist?.items ?? [];
                        const filledCount = items.filter(o => o.status === "Filled").length;
                        portfolioSummary.value = {
                            startingBalance,
                            currentCash,
                            openPositionsValue: trueEquity - currentCash,
                            trueEquity,
                            realizedPnl24h: realized,
                            unrealizedPnlTotal: unrealized,
                            netPnl,
                            netPnlPct,
                            totalCommissionPaid: 0,           // fallback — backend yokken bilinmiyor
                            netProfitAfterFees: netPnl,
                            winningTrades: 0,
                            losingTrades: 0,
                            winRate: 0,
                            openPositionCount: pnl?.openPositionCount ?? 0,
                            closedTradeCount: filledCount,
                            asOfUtc: new Date().toISOString(),
                            _fallback: true,
                        };
                        portfolioError.value = null;
                    } catch (e2) {
                        portfolioError.value = e2;
                    }
                } else {
                    portfolioError.value = e;
                }
            }
        }

        fetchPortfolio();
        const portfolioTimer = setInterval(fetchPortfolio, 3000);
        // Cleanup için window unload'a güven (page-level component zaten unmount eder).
        if (typeof window !== "undefined") {
            window.addEventListener("beforeunload", () => clearInterval(portfolioTimer), { once: true });
        }

        const anyError = computed(() =>
            summaryPoll.error.value ?? ordersPoll.error.value ?? portfolioError.value);

        const netClass = computed(() => {
            const v = portfolioSummary.value?.netPnl ?? 0;
            return fmt.sign(v);
        });

        const winRateClass = computed(() => {
            const r = portfolioSummary.value?.winRate ?? 0;
            return r >= 60 ? "metric-good" : r >= 40 ? "metric-warn" : "metric-bad";
        });

        function modeBadge(m) {
            if (m === "Paper") return "open";
            if (m === "LiveTestnet") return "warn";
            if (m === "LiveMainnet") return "bad";
            return "";
        }
        function modeLabel(m) {
            if (m === "LiveTestnet") return "TEST";
            if (m === "LiveMainnet") return "MAIN";
            return "PAPER";
        }
        function baseAsset(sym) { return sym.replace(/USDT$/i, ""); }
        function signalLabel(dir) {
            return dir === "Long" ? "ALIŞ" : dir === "Short" ? "SATIŞ" : "ÇIKIŞ";
        }
        function signalBadge(dir) {
            return dir === "Long" ? "up" : dir === "Short" ? "down" : "warn";
        }
        function statusBadge(s) {
            if (s === "Filled") return "good";
            if (s === "Rejected" || s === "Cancelled" || s === "Expired") return "bad";
            if (s === "PartiallyFilled") return "warn";
            return "open";
        }
        function statusLabel(s) {
            return s === "Filled" ? "DOLDU"
                : s === "Cancelled" ? "İPTAL"
                : s === "Rejected" ? "RED"
                : s === "PartiallyFilled" ? "KISMI"
                : s === "Expired" ? "SÜRE DOLDU"
                : "AÇIK";
        }

        return {
            symbolList: SYMBOLS,
            summary: portfolioSummary,
            summary2: summaryPoll.data,
            orders: ordersPoll.data,
            anyError,
            netClass, winRateClass,
            baseAsset, signalLabel, signalBadge, statusBadge, statusLabel,
            modeBadge, modeLabel,
            // signals: backend latestSignals var; ama küçük poll ekleyelim
            signals: usePolling(() => api.strategies.latestSignals(8), 5000).data,
            fmt,
        };
    },
};

createApp(App).mount("#app");
</script>
</body>
</html>
