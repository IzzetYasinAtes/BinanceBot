<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>İşlemler · BinanceBot</title>
<link rel="stylesheet" href="/css/style.css">
<script type="importmap">
{ "imports": { "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js" } }
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, ref, watch, computed } from "vue";
import { api } from "/js/api.js";
import { fmt } from "/js/format.js";
import { Sidebar, ErrorBanner, usePolling } from "/js/ui.js";

const OrderRows = {
    props: ["rows"],
    setup(props) {
        function statusBadge(s) {
            if (s === "Filled") return "good";
            if (s === "Rejected" || s === "Cancelled" || s === "Expired") return "bad";
            if (s === "PartiallyFilled") return "warn";
            return "open";
        }
        function modeBadge(m) {
            if (m === "Paper") return "open";
            if (m === "LiveTestnet") return "warn";
            if (m === "LiveMainnet") return "bad";
            return "";
        }
        function modeLabel(m) {
            if (m === "LiveTestnet") return "TEST";
            if (m === "LiveMainnet") return "MAIN";
            return "PAPER";
        }
        return { fmt, statusBadge, modeBadge, modeLabel };
    },
    template: `
        <table class="data">
            <thead><tr>
                <th>ClientId</th><th>Sembol</th><th>Mode</th><th>Yön</th><th>Tip</th><th>Durum</th>
                <th class="align-right">Adet</th>
                <th class="align-right">Gerçekleşen</th>
                <th class="align-right">Fiyat</th>
                <th>Zaman</th>
            </tr></thead>
            <tbody>
                <tr v-for="o in rows" :key="o.clientOrderId">
                    <td style="font-size:10.5px;color:var(--fg-3);">{{ o.clientOrderId }}</td>
                    <td><strong>{{ o.symbol }}</strong></td>
                    <td><span class="badge" :class="modeBadge(o.mode)">{{ modeLabel(o.mode) }}</span></td>
                    <td><span class="badge" :class="o.side === 'Buy' ? 'up' : 'down'">{{ o.side === 'Buy' ? 'UP' : 'DOWN' }}</span></td>
                    <td>{{ o.type }}</td>
                    <td><span class="badge" :class="statusBadge(o.status)">{{ o.status }}</span></td>
                    <td class="align-right">{{ fmt.num4(o.quantity) }}</td>
                    <td class="align-right">{{ fmt.num4(o.executedQuantity) }}</td>
                    <td class="align-right">{{ o.price ? fmt.price(o.price) : '—' }}</td>
                    <td style="color:var(--fg-3);">{{ fmt.timeHms(o.createdAt) }}</td>
                </tr>
                <tr v-if="rows.length === 0">
                    <td colspan="10" style="text-align:center;color:var(--fg-3);padding:18px;">Kayıt yok</td>
                </tr>
            </tbody>
        </table>
    `,
};

const PositionRows = {
    props: ["rows"],
    setup() {
        function sideBadge(s) {
            return s === "Long" ? "up" : s === "Short" ? "down" : "";
        }
        function sideLabel(s) {
            return s === "Long" ? "LONG" : s === "Short" ? "SHORT" : s;
        }
        return { fmt, sideBadge, sideLabel };
    },
    template: `
        <table class="data">
            <thead><tr>
                <th>Sembol</th>
                <th>Yön</th>
                <th class="align-right">Adet</th>
                <th class="align-right">Giriş</th>
                <th class="align-right">Mark</th>
                <th class="align-right">Unrealized PnL</th>
                <th>Açılış</th>
            </tr></thead>
            <tbody>
                <tr v-for="p in rows" :key="p.id">
                    <td><strong>{{ p.symbol }}</strong></td>
                    <td><span class="badge" :class="sideBadge(p.side)">{{ sideLabel(p.side) }}</span></td>
                    <td class="align-right">{{ fmt.num4(p.quantity) }}</td>
                    <td class="align-right">{{ fmt.price(p.averageEntryPrice) }}</td>
                    <td class="align-right">{{ fmt.price(p.markPrice) }}</td>
                    <td class="align-right" :class="fmt.sign(p.unrealizedPnl)">
                        \${{ fmt.num2(p.unrealizedPnl ?? 0) }}
                    </td>
                    <td style="color:var(--fg-3);">{{ fmt.timeHms(p.openedAt) }}</td>
                </tr>
                <tr v-if="rows.length === 0">
                    <td colspan="7" style="text-align:center;color:var(--fg-3);padding:18px;">Açık pozisyon yok</td>
                </tr>
            </tbody>
        </table>
    `,
};

const App = {
    components: { Sidebar, ErrorBanner, OrderRows, PositionRows },
    template: `
        <div class="app">
            <Sidebar active="orders" />
            <main>
                <section class="block">
                    <h2 class="section">Açık Pozisyonlar</h2>
                    <p class="section-sub">Şu anda açık olan trade pozisyonları.</p>
                    <div class="toolbar">
                        <label>Sembol
                            <input v-model="positionSymbol" placeholder="opsiyonel" style="width:120px;">
                        </label>
                        <span style="color:var(--fg-3);font-size:12px;" v-if="positionsPoll.data.value">
                            toplam: {{ positionsPoll.data.value.length }}
                        </span>
                    </div>
                    <ErrorBanner :error="positionsPoll.error.value" />
                    <PositionRows v-if="positionsPoll.data.value" :rows="positionsPoll.data.value" />
                    <div v-else class="skeleton" style="height:80px"></div>
                </section>

                <section class="block">
                    <h2 class="section">İşlem Geçmişi</h2>
                    <p class="section-sub">Son gerçekleşen alım/satım kayıtları.</p>
                    <div class="toolbar">
                        <label>Sembol
                            <input v-model="symbol" placeholder="opsiyonel" style="width:120px;">
                        </label>
                        <label>Mod
                            <select v-model="mode">
                                <option value="">hepsi</option>
                                <option value="Paper">Paper</option>
                                <option value="LiveTestnet">LiveTestnet</option>
                                <option value="LiveMainnet">LiveMainnet</option>
                            </select>
                        </label>
                        <label>Limit
                            <select v-model.number="take">
                                <option>20</option><option>50</option><option>100</option>
                            </select>
                        </label>
                        <span style="color:var(--fg-3);font-size:12px;" v-if="historyPoll.data.value">
                            toplam: {{ historyPoll.data.value.totalCount }}<span v-if="mode"> · filtre: {{ filteredHistory?.length ?? 0 }}</span>
                        </span>
                    </div>
                    <ErrorBanner :error="historyPoll.error.value" />
                    <OrderRows v-if="filteredHistory" :rows="filteredHistory" />
                    <div v-else class="skeleton" style="height:80px"></div>
                </section>
            </main>
        </div>
    `,
    setup() {
        const symbol = ref("");
        const take = ref(50);
        const mode = ref("");
        const positionSymbol = ref("");

        const positionsPoll = usePolling(
            () => api.positions.list({ status: "Open", symbol: positionSymbol.value }),
            3000);
        const historyPoll = usePolling(
            () => api.orders.history({ symbol: symbol.value, skip: 0, take: take.value }),
            5000);

        watch([symbol, take], () => { historyPoll.refresh(); });
        watch(positionSymbol, () => { positionsPoll.refresh(); });

        const filteredHistory = computed(() => {
            const payload = historyPoll.data.value;
            if (!payload) return null;
            const items = payload.items ?? [];
            if (!mode.value) return items;
            return items.filter(o => o.mode === mode.value);
        });

        return { symbol, take, mode, positionSymbol, positionsPoll, historyPoll, filteredHistory };
    },
};

createApp(App).mount("#app");
</script>
</body>
</html>
