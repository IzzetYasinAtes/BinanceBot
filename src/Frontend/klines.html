<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canlı Grafik · BinanceBot</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.chart-shell {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    overflow: hidden;
}
.chart-legend {
    position: absolute;
    top: 10px;
    left: 12px;
    z-index: 5;
    padding: 8px 12px;
    background: rgba(11,15,20,.85);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    color: var(--fg-1);
    display: flex;
    gap: 14px;
    align-items: center;
    pointer-events: none;
    backdrop-filter: blur(4px);
    flex-wrap: wrap;
    max-width: calc(100% - 24px);
}
.chart-legend .lg-sym { font-weight: 700; color: var(--fg-0); letter-spacing: 0.4px; }
.chart-legend .lg-iv  { color: var(--fg-2); font-size: 10.5px; }
.chart-legend .lg-kv { display: inline-flex; gap: 4px; }
.chart-legend .lg-kv > span:first-child { color: var(--fg-2); }
.chart-pane { width: 100%; height: 460px; }
.chart-vol  { width: 100%; height: 120px; border-top: 1px solid var(--border-soft); }
</style>
<script type="importmap">
{
    "imports": {
        "vue": "https://unpkg.com/vue@3.5.13/dist/vue.esm-browser.prod.js",
        "lightweight-charts": "https://esm.sh/lightweight-charts@4.2.0"
    }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createApp, ref, onMounted, watch, onBeforeUnmount } from "vue";
import { createChart, CrosshairMode, ColorType } from "lightweight-charts";
import { api } from "/js/api.js";
import { fmt } from "/js/format.js";
import { Sidebar, ErrorBanner, usePolling } from "/js/ui.js";

const CHART_THEME = {
    layout: {
        background: { type: ColorType.Solid, color: "#0b0f14" },
        textColor: "#9aa8b9",
        fontFamily: "JetBrains Mono, ui-monospace, monospace",
        fontSize: 11,
    },
    grid: {
        vertLines: { color: "#141a23" },
        horzLines: { color: "#141a23" },
    },
    crosshair: {
        mode: CrosshairMode.Normal,
        vertLine: { color: "#22d3a6", width: 1, style: 3, labelBackgroundColor: "#22d3a6" },
        horzLine: { color: "#22d3a6", width: 1, style: 3, labelBackgroundColor: "#22d3a6" },
    },
    rightPriceScale: {
        borderColor: "#1e2530",
        scaleMargins: { top: 0.08, bottom: 0.22 },
    },
    timeScale: {
        borderColor: "#1e2530",
        timeVisible: true,
        secondsVisible: false,
        rightOffset: 4,
    },
};

const App = {
    components: { Sidebar, ErrorBanner },
    template: `
        <div class="app">
            <Sidebar active="klines" />
            <main>
                <section class="block">
                    <h2 class="section">Canlı Grafik</h2>
                    <p class="section-sub">Mum grafik + hacim. Çubuk üzerine geldiğinizde OHLC değerleri üst solda belirir; zaman ekseni ile fiyat ekseni birlikte hareket eder.</p>
                    <div class="toolbar">
                        <label>Sembol
                            <select v-model="symbol">
                                <option>BTCUSDT</option><option>BNBUSDT</option><option>XRPUSDT</option>
                            </select>
                        </label>
                        <label>Aralık
                            <select v-model="interval">
                                <option>1m</option><option>5m</option><option>15m</option>
                                <option>1h</option><option>4h</option><option>1d</option>
                            </select>
                        </label>
                        <label>Bar
                            <select v-model.number="limit">
                                <option>100</option><option>250</option><option>500</option>
                            </select>
                        </label>
                        <span v-if="barCount" style="color:var(--fg-3);font-size:11px;margin-left:auto;">
                            {{ barCount }} bar yüklendi
                        </span>
                    </div>
                    <ErrorBanner :error="poll.error.value" />

                    <div class="chart-shell">
                        <div v-if="poll.data.value !== null && barCount === 0"
                             style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--fg-3);font-size:12px;pointer-events:none;z-index:3;">
                            Bu sembol+aralık için veri yok
                        </div>
                        <div class="chart-legend">
                            <span class="lg-sym">{{ symbol }}</span>
                            <span class="lg-iv">{{ interval }}</span>
                            <template v-if="hover">
                                <span class="lg-kv"><span>O</span><strong>{{ fmt.price(hover.open) }}</strong></span>
                                <span class="lg-kv"><span>H</span><strong style="color:var(--good);">{{ fmt.price(hover.high) }}</strong></span>
                                <span class="lg-kv"><span>L</span><strong style="color:var(--bad);">{{ fmt.price(hover.low) }}</strong></span>
                                <span class="lg-kv"><span>C</span><strong :style="{ color: hover.close >= hover.open ? 'var(--good)' : 'var(--bad)' }">{{ fmt.price(hover.close) }}</strong></span>
                                <span class="lg-kv"><span>Vol</span><strong>{{ fmt.num2(hover.volume) }}</strong></span>
                                <span class="lg-kv" style="color:var(--fg-3);"><span>t</span>{{ hover.timeLabel }}</span>
                            </template>
                            <template v-else-if="lastBar">
                                <span class="lg-kv"><span>O</span><strong>{{ fmt.price(lastBar.open) }}</strong></span>
                                <span class="lg-kv"><span>H</span><strong style="color:var(--good);">{{ fmt.price(lastBar.high) }}</strong></span>
                                <span class="lg-kv"><span>L</span><strong style="color:var(--bad);">{{ fmt.price(lastBar.low) }}</strong></span>
                                <span class="lg-kv"><span>C</span><strong :style="{ color: lastBar.close >= lastBar.open ? 'var(--good)' : 'var(--bad)' }">{{ fmt.price(lastBar.close) }}</strong></span>
                                <span class="lg-kv"><span>Vol</span><strong>{{ fmt.num2(lastBar.volume) }}</strong></span>
                            </template>
                        </div>
                        <div class="chart-pane" ref="priceEl"></div>
                        <div class="chart-vol"  ref="volEl"></div>
                    </div>
                </section>
            </main>
        </div>
    `,
    setup() {
        const symbol = ref("BTCUSDT");
        const interval = ref("1m");
        const limit = ref(500);
        const priceEl = ref(null);
        const volEl = ref(null);
        const hover = ref(null);
        const lastBar = ref(null);
        const barCount = ref(0);

        let priceChart = null;
        let volChart = null;
        let candleSeries = null;
        let volSeries = null;
        let resizeObserver = null;
        let syncing = false;

        const poll = usePolling(
            () => api.klines(symbol.value, interval.value, limit.value),
            2500);

        function disposeCharts() {
            if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
            if (priceChart) { priceChart.remove(); priceChart = null; }
            if (volChart)   { volChart.remove();   volChart = null; }
            candleSeries = null;
            volSeries = null;
        }

        function initCharts() {
            disposeCharts();
            if (!priceEl.value || !volEl.value) return;

            priceChart = createChart(priceEl.value, {
                ...CHART_THEME,
                width: priceEl.value.clientWidth,
                height: priceEl.value.clientHeight,
            });
            candleSeries = priceChart.addCandlestickSeries({
                upColor: "#4ad17c", downColor: "#ef5350",
                borderUpColor: "#4ad17c", borderDownColor: "#ef5350",
                wickUpColor: "#4ad17c", wickDownColor: "#ef5350",
            });

            volChart = createChart(volEl.value, {
                ...CHART_THEME,
                width: volEl.value.clientWidth,
                height: volEl.value.clientHeight,
                timeScale: { ...CHART_THEME.timeScale, visible: false },
                rightPriceScale: { borderColor: "#1e2530", scaleMargins: { top: 0.2, bottom: 0 } },
            });
            volSeries = volChart.addHistogramSeries({
                priceFormat: { type: "volume" },
                color: "#22d3a6",
                priceScaleId: "",
            });
            volSeries.priceScale().applyOptions({ scaleMargins: { top: 0.2, bottom: 0 } });

            priceChart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                if (!r || syncing || !volChart) return;
                syncing = true;
                volChart.timeScale().setVisibleLogicalRange(r);
                syncing = false;
            });
            volChart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                if (!r || syncing || !priceChart) return;
                syncing = true;
                priceChart.timeScale().setVisibleLogicalRange(r);
                syncing = false;
            });

            priceChart.subscribeCrosshairMove((param) => {
                if (!param.time || !param.seriesData || param.seriesData.size === 0) {
                    hover.value = null;
                    return;
                }
                const candle = param.seriesData.get(candleSeries);
                const vol    = param.seriesData.get(volSeries);
                if (!candle) { hover.value = null; return; }
                hover.value = {
                    open: candle.open, high: candle.high, low: candle.low, close: candle.close,
                    volume: vol?.value ?? 0,
                    timeLabel: formatTime(param.time),
                };
            });

            const ro = new ResizeObserver(() => {
                if (priceChart && priceEl.value) {
                    priceChart.applyOptions({ width: priceEl.value.clientWidth });
                }
                if (volChart && volEl.value) {
                    volChart.applyOptions({ width: volEl.value.clientWidth });
                }
            });
            ro.observe(priceEl.value);
            ro.observe(volEl.value);
            resizeObserver = ro;
        }

        function formatTime(sec) {
            const d = new Date(sec * 1000);
            return d.toISOString().substring(11, 16);
        }

        function render(rows) {
            if (!rows || !candleSeries || !volSeries) return;

            const bars = rows.map(r => ({
                time: Math.floor(new Date(r.openTime).getTime() / 1000),
                open: Number(r.open),
                high: Number(r.high),
                low:  Number(r.low),
                close: Number(r.close),
            }));
            const volumes = rows.map(r => ({
                time: Math.floor(new Date(r.openTime).getTime() / 1000),
                value: Number(r.volume),
                color: Number(r.close) >= Number(r.open)
                    ? "rgba(74,209,124,0.55)"
                    : "rgba(239,83,80,0.55)",
            }));

            candleSeries.setData(bars);
            volSeries.setData(volumes);
            priceChart.timeScale().fitContent();

            barCount.value = bars.length;
            if (bars.length > 0) {
                const lr = rows[rows.length - 1];
                lastBar.value = {
                    open: Number(lr.open), high: Number(lr.high),
                    low:  Number(lr.low),  close: Number(lr.close),
                    volume: Number(lr.volume),
                };
            } else {
                lastBar.value = null;
            }
        }

        onMounted(() => {
            initCharts();
            if (poll.data.value) render(poll.data.value);
        });

        watch(poll.data, (v) => {
            if (!candleSeries) initCharts();
            render(v);
        });

        watch([symbol, interval, limit], () => {
            hover.value = null;
            lastBar.value = null;
            barCount.value = 0;
            initCharts();
            poll.refresh();
        });

        onBeforeUnmount(disposeCharts);

        return { symbol, interval, limit, poll, priceEl, volEl, hover, lastBar, barCount, fmt };
    },
};

createApp(App).mount("#app");
</script>
</body>
</html>
